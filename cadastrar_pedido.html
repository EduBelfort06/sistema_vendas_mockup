<!doctype html>
<html lang="pt-BR" class="h-100" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Cadastrar Pedido" />
    <title>Cadastrar Pedido - Sistema de Vendas</title>
    <script src="assets/js/color-modes.js"></script>
    <link href="assets/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="sticky-footer-navbar.css" rel="stylesheet" />
    <link href="assets/css/custom.css" rel="stylesheet" />
  </head>
  <body class="d-flex flex-column h-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">📊 Sistema de Vendas</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="listar_clientes.html">👥 Clientes</a></li>
            <li class="nav-item"><a class="nav-link" href="listar_produto.html">📦 Produtos</a></li>
            <li class="nav-item"><a class="nav-link" href="listar_pedido.html">🛒 Pedidos</a></li>
            <li class="nav-item ms-2">
              <button id="theme-toggle-btn" class="btn btn-light" title="Alternar tema">
                <i class="bi bi-moon-fill"></i>
                <span class="theme-text d-none d-md-inline">Escuro</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-shrink-0">
      <div class="container py-5">
        <div class="row">
          <div class="col-lg-10 offset-lg-1">
            <h1 class="mb-4">Criar Novo Pedido</h1>
            
            <form id="formPedido">
              <div class="row mb-4">
                <div class="col-md-6">
                  <label for="cliente" class="form-label">Cliente *</label>
                  <select class="form-select" id="cliente" required>
                    <option value="">Selecione um cliente</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="dataPedido" class="form-label">Data do Pedido *</label>
                  <input type="date" class="form-control" id="dataPedido" required>
                </div>
              </div>

              <div class="row mb-4">
                <div class="col-md-6">
                  <label for="status" class="form-label">Status *</label>
                  <select class="form-select" id="status" required>
                    <option value="">Selecione um status</option>
                    <option value="Pendente">Pendente</option>
                    <option value="Confirmado">Confirmado</option>
                    <option value="Enviado">Enviado</option>
                    <option value="Entregue">Entregue</option>
                    <option value="Cancelado">Cancelado</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="dataPrevista" class="form-label">Data Prevista de Entrega</label>
                  <input type="date" class="form-control" id="dataPrevista">
                </div>
              </div>

              <!-- Produtos do Pedido -->
              <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                  <h5 class="mb-0">Produtos do Pedido</h5>
                </div>
                <div class="card-body">
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label for="produtoSelect" class="form-label">Adicionar Produto</label>
                      <select class="form-select" id="produtoSelect">
                        <option value="">Selecione um produto</option>
                      </select>
                    </div>
                    <div class="col-md-3">
                      <label for="quantidadeProduto" class="form-label">Quantidade</label>
                      <input type="number" class="form-control" id="quantidadeProduto" min="1" value="1">
                    </div>
                    <div class="col-md-3">
                      <label>&nbsp;</label>
                      <button type="button" class="btn btn-success w-100" id="btnAdicionarProduto">
                        + Adicionar
                      </button>
                    </div>
                  </div>

                  <!-- Tabela de Produtos Adicionados -->
                  <div class="table-responsive">
                    <table class="table table-sm table-bordered">
                      <thead class="table-light">
                        <tr>
                          <th>Produto</th>
                          <th>Preço Unit.</th>
                          <th>Quantidade</th>
                          <th>Subtotal</th>
                          <th>Ação</th>
                        </tr>
                      </thead>
                      <tbody id="tabelaProdutosPedido">
                        <tr>
                          <td colspan="5" class="text-center text-muted">Nenhum produto adicionado</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

              <!-- Resumo do Pedido -->
              <div class="row mb-4">
                <div class="col-md-6 offset-md-6">
                  <div class="card">
                    <div class="card-body">
                      <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal:</span>
                        <span id="subtotal">R$ 0,00</span>
                      </div>
                      <div class="d-flex justify-content-between mb-2">
                        <label for="desconto">Desconto (%):</label>
                        <input type="number" id="desconto" class="form-control" style="width: 100px;" min="0" max="100" value="0">
                      </div>
                      <div class="d-flex justify-content-between mb-3">
                        <span>Desconto:</span>
                        <span id="descontoValor">R$ 0,00</span>
                      </div>
                      <hr>
                      <div class="d-flex justify-content-between">
                        <strong>Total:</strong>
                        <strong id="total" style="font-size: 1.2rem; color: #28a745;">R$ 0,00</strong>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="mb-3">
                <label for="observacoes" class="form-label">Observações</label>
                <textarea class="form-control" id="observacoes" rows="3" placeholder="Observações sobre o pedido..."></textarea>
              </div>

              <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <a href="listar_pedido.html" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Criar Pedido</button>
              </div>
            </form>

            <div id="alertaMsg" class="alert alert-success mt-3" style="display: none;" role="alert"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-body-tertiary">
      <div class="container">
        <span class="text-body-secondary">&copy; 2026 Sistema de Vendas. Todos os direitos reservados.</span>
      </div>
    </footer>

    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      let produtosPedido = [];

      function carregarClientes() {
        const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
        const select = document.getElementById('cliente');
        select.innerHTML = '<option value="">Selecione um cliente</option>';
        clientes.forEach(cliente => {
          const option = document.createElement('option');
          option.value = cliente.id;
          option.textContent = cliente.nome;
          select.appendChild(option);
        });
      }

      function carregarProdutos() {
        const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        const select = document.getElementById('produtoSelect');
        select.innerHTML = '<option value="">Selecione um produto</option>';
        produtos.forEach(produto => {
          const option = document.createElement('option');
          option.value = produto.id;
          option.textContent = `${produto.nome} - R$ ${produto.preco.toFixed(2).replace('.', ',')}`;
          option.dataset.preco = produto.preco;
          select.appendChild(option);
        });
      }

      function atualizarTabela() {
        const tbody = document.getElementById('tabelaProdutosPedido');
        
        if (produtosPedido.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Nenhum produto adicionado</td></tr>';
          atualizarTotais();
          return;
        }

        tbody.innerHTML = produtosPedido.map((item, index) => `
          <tr>
            <td>${item.nome}</td>
            <td>R$ ${item.preco.toFixed(2).replace('.', ',')}</td>
            <td>${item.quantidade}</td>
            <td>R$ ${(item.preco * item.quantidade).toFixed(2).replace('.', ',')}</td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="removerProduto(${index})">Remover</button></td>
          </tr>
        `).join('');

        atualizarTotais();
      }

      function removerProduto(index) {
        produtosPedido.splice(index, 1);
        atualizarTabela();
      }

      function atualizarTotais() {
        let subtotal = 0;
        produtosPedido.forEach(item => {
          subtotal += item.preco * item.quantidade;
        });

        const desconto = parseFloat(document.getElementById('desconto').value) || 0;
        const descontoValor = (subtotal * desconto) / 100;
        const total = subtotal - descontoValor;

        document.getElementById('subtotal').textContent = 'R$ ' + subtotal.toFixed(2).replace('.', ',');
        document.getElementById('descontoValor').textContent = 'R$ ' + descontoValor.toFixed(2).replace('.', ',');
        document.getElementById('total').textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
      }

      document.getElementById('btnAdicionarProduto').addEventListener('click', function() {
        const select = document.getElementById('produtoSelect');
        const quantidade = parseInt(document.getElementById('quantidadeProduto').value);
        const produtoId = parseInt(select.value);

        if (!produtoId) {
          alert('Selecione um produto');
          return;
        }

        const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        const produto = produtos.find(p => p.id === produtoId);

        if (produto) {
          const existe = produtosPedido.findIndex(p => p.id === produtoId);
          if (existe !== -1) {
            produtosPedido[existe].quantidade += quantidade;
          } else {
            produtosPedido.push({
              id: produto.id,
              nome: produto.nome,
              preco: produto.preco,
              quantidade: quantidade
            });
          }
          atualizarTabela();
          select.value = '';
          document.getElementById('quantidadeProduto').value = 1;
        }
      });

      document.getElementById('desconto').addEventListener('change', atualizarTotais);

      document.getElementById('dataPedido').valueAsDate = new Date();

      document.getElementById('formPedido').addEventListener('submit', function(e) {
        e.preventDefault();

        if (produtosPedido.length === 0) {
          alert('Adicione pelo menos um produto ao pedido');
          return;
        }

        const subtotal = produtosPedido.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);
        const desconto = parseFloat(document.getElementById('desconto').value) || 0;
        const descontoValor = (subtotal * desconto) / 100;
        const total = subtotal - descontoValor;

        const pedido = {
          id: Date.now(),
          clienteId: parseInt(document.getElementById('cliente').value),
          dataPedido: document.getElementById('dataPedido').value,
          dataPrevista: document.getElementById('dataPrevista').value,
          status: document.getElementById('status').value,
          produtos: [...produtosPedido],
          subtotal: subtotal,
          desconto: desconto,
          descontoValor: descontoValor,
          total: total,
          observacoes: document.getElementById('observacoes').value
        };

        let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
        pedidos.push(pedido);
        localStorage.setItem('pedidos', JSON.stringify(pedidos));

        const alerta = document.getElementById('alertaMsg');
        alerta.textContent = '✅ Pedido criado com sucesso!';
        alerta.style.display = 'block';

        setTimeout(() => {
          window.location.href = 'listar_pedido.html';
        }, 2000);
      });

      document.addEventListener('DOMContentLoaded', function() {
        carregarClientes();
        carregarProdutos();
      });
    </script>
  </body>
</html>

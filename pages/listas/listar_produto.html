<!doctype html>
<html lang="pt-BR" class="h-100" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Listar Produtos" />
    <title>Listar Produtos - Sistema de Vendas</title>
    <script src="../../assets/js/color-modes.js"></script>
    <link href="../../assets/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="../../sticky-footer-navbar.css" rel="stylesheet" />
    <link href="../../assets/css/custom.css" rel="stylesheet" />
  </head>
  <body class="d-flex flex-column h-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="../../index.html">📊 Sistema de Vendas</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="../listas/listar_clientes.html">👥 Clientes</a></li>
            <li class="nav-item"><a class="nav-link" href="../cadastro/cadastrar_produto.html">📦 Novo Produto</a></li>
            <li class="nav-item"><a class="nav-link" href="listar_pedido.html">🛒 Pedidos</a></li>
            <li class="nav-item ms-2 dropdown">
              <button id="theme-toggle-btn" class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Selecionar tema">
                <i class="bi bi-sun-fill"></i>
                <span class="theme-text d-none d-md-inline">Claro</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><button class="dropdown-item theme-option" type="button" data-theme="light"><i class="bi bi-sun-fill me-2"></i> Claro</button></li>
                <li><button class="dropdown-item theme-option" type="button" data-theme="dark"><i class="bi bi-moon-fill me-2"></i> Escuro</button></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-shrink-0">
      <div class="container py-5">
        <div class="row mb-4">
          <div class="col-md-8">
            <h1>📦 Lista de Produtos</h1>
          </div>
          <div class="col-md-4 text-end">
            <a href="../cadastro/cadastrar_produto.html" class="btn btn-primary">+ Novo Produto</a>
          </div>
        </div>

        <!-- Filtros -->
        <div class="row mb-4">
          <div class="col-md-6">
            <input type="text" class="form-control" id="campoBusca" placeholder="Buscar por nome ou código SKU...">
          </div>
          <div class="col-md-6">
            <select class="form-select" id="filtroCategoria">
              <option value="">Filtrar por categoria...</option>
              <option value="Eletrônicos">Eletrônicos</option>
              <option value="Roupas">Roupas</option>
              <option value="Alimentos">Alimentos</option>
              <option value="Livros">Livros</option>
              <option value="Móveis">Móveis</option>
              <option value="Outros">Outros</option>
            </select>
          </div>
        </div>

        <!-- Tabela de Produtos -->
        <div class="table-responsive">
          <table class="table table-striped table-hover">
            <thead class="table-dark">
              <tr>
                <th>Nome</th>
                <th>SKU</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaProdutos">
              <tr>
                <td colspan="7" class="text-center text-muted">Nenhum produto cadastrado</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Modal de Edição -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalEditarLabel">Editar Produto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="formEditar">
              <input type="hidden" id="editarId">
              <div class="row mb-3">
                <div class="col-md-8">
                  <label for="editarNome" class="form-label">Nome</label>
                  <input type="text" class="form-control" id="editarNome" required>
                </div>
                <div class="col-md-4">
                  <label for="editarCodigo" class="form-label">Código SKU</label>
                  <input type="text" class="form-control" id="editarCodigo" required>
                </div>
              </div>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="editarPreco" class="form-label">Preço</label>
                  <input type="number" class="form-control" id="editarPreco" step="0.01" required>
                </div>
                <div class="col-md-6">
                  <label for="editarQuantidade" class="form-label">Quantidade</label>
                  <input type="number" class="form-control" id="editarQuantidade" required>
                </div>
              </div>
              <div class="mb-3">
                <label for="editarDescricao" class="form-label">Descrição</label>
                <textarea class="form-control" id="editarDescricao" rows="2"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btnSalvarEdicao">Salvar Alterações</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-body-tertiary">
      <div class="container">
        <span class="text-body-secondary">&copy; 2026 Sistema de Vendas. Todos os direitos reservados.</span>
      </div>
    </footer>

    <script src="../../assets/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
      function getStatusEstoque(quantidade) {
        if (quantidade === 0) return '<span class="badge bg-danger">Sem Estoque</span>';
        if (quantidade < 5) return '<span class="badge bg-warning">Baixo Estoque</span>';
        return '<span class="badge bg-success">Em Estoque</span>';
      }

      function carregarProdutos(filtro = null) {
        const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        let produtosFiltrados = produtos;
        
        const busca = document.getElementById('campoBusca').value.toLowerCase();
        const categoria = document.getElementById('filtroCategoria').value;
        
        if (busca) {
          produtosFiltrados = produtosFiltrados.filter(p => 
            p.nome.toLowerCase().includes(busca) || 
            p.codigo.toLowerCase().includes(busca)
          );
        }
        
        if (categoria) {
          produtosFiltrados = produtosFiltrados.filter(p => p.categoria === categoria);
        }
        
        const tbody = document.getElementById('tabelaProdutos');
        
        if (produtosFiltrados.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Nenhum produto encontrado</td></tr>';
          return;
        }

        tbody.innerHTML = produtosFiltrados.map(produto => `
          <tr>
            <td>${produto.nome}</td>
            <td>${produto.codigo}</td>
            <td>${produto.categoria}</td>
            <td>R$ ${produto.preco.toFixed(2).replace('.', ',')}</td>
            <td>${produto.quantidade}</td>
            <td>${getStatusEstoque(produto.quantidade)}</td>
            <td>
              <button class="btn btn-sm btn-warning" onclick="abrirEdicao(${produto.id})">Editar</button>
              <button class="btn btn-sm btn-danger" onclick="deletarProduto(${produto.id})">Deletar</button>
            </td>
          </tr>
        `).join('');
      }

      function abrirEdicao(id) {
        const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        const produto = produtos.find(p => p.id === id);
        
        if (produto) {
          document.getElementById('editarId').value = produto.id;
          document.getElementById('editarNome').value = produto.nome;
          document.getElementById('editarCodigo').value = produto.codigo;
          document.getElementById('editarPreco').value = produto.preco;
          document.getElementById('editarQuantidade').value = produto.quantidade;
          document.getElementById('editarDescricao').value = produto.descricao;
          
          const modal = new bootstrap.Modal(document.getElementById('modalEditar'));
          modal.show();
        }
      }

      function salvarEdicao() {
        const id = parseInt(document.getElementById('editarId').value);
        const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        const index = produtos.findIndex(p => p.id === id);
        
        if (index !== -1) {
          produtos[index].nome = document.getElementById('editarNome').value;
          produtos[index].codigo = document.getElementById('editarCodigo').value;
          produtos[index].preco = parseFloat(document.getElementById('editarPreco').value);
          produtos[index].quantidade = parseInt(document.getElementById('editarQuantidade').value);
          produtos[index].descricao = document.getElementById('editarDescricao').value;
          
          localStorage.setItem('produtos', JSON.stringify(produtos));
          bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
          carregarProdutos();
        }
      }

      function deletarProduto(id) {
        if (confirm('Tem certeza que deseja deletar este produto?')) {
          let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
          produtos = produtos.filter(p => p.id !== id);
          localStorage.setItem('produtos', JSON.stringify(produtos));
          carregarProdutos();
        }
      }

      document.getElementById('btnSalvarEdicao').addEventListener('click', salvarEdicao);
      document.getElementById('campoBusca').addEventListener('keyup', carregarProdutos);
      document.getElementById('filtroCategoria').addEventListener('change', carregarProdutos);

      document.addEventListener('DOMContentLoaded', carregarProdutos);
    </script>
  </body>
</html>

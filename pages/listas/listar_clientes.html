<!doctype html>
<html lang="pt-BR" class="h-100" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Listar Clientes" />
    <title>Listar Clientes - Sistema de Vendas</title>
    <script src="../../assets/js/color-modes.js"></script>
    <link href="../../assets/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="../../sticky-footer-navbar.css" rel="stylesheet" />
    <link href="../../assets/css/custom.css" rel="stylesheet" />
  </head>
  <body class="d-flex flex-column h-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="../../index.html">📊 Sistema de Vendas</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="../cadastro/cadastrar_cliente.html">👥 Novo Cliente</a></li>
            <li class="nav-item"><a class="nav-link" href="listar_produto.html">📦 Produtos</a></li>
            <li class="nav-item"><a class="nav-link" href="listar_pedido.html">🛒 Pedidos</a></li>
            <li class="nav-item ms-2 dropdown">
              <button id="theme-toggle-btn" class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Selecionar tema">
                <i class="bi bi-sun-fill"></i>
                <span class="theme-text d-none d-md-inline">Claro</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><button class="dropdown-item theme-option" type="button" data-theme="light"><i class="bi bi-sun-fill me-2"></i> Claro</button></li>
                <li><button class="dropdown-item theme-option" type="button" data-theme="dark"><i class="bi bi-moon-fill me-2"></i> Escuro</button></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-shrink-0">
      <div class="container py-5">
        <div class="row mb-4">
          <div class="col-md-8">
            <h1>👥 Lista de Clientes</h1>
          </div>
          <div class="col-md-4 text-end">
            <a href="../cadastro/cadastrar_cliente.html" class="btn btn-primary">+ Novo Cliente</a>
          </div>
        </div>

        <!-- Campo de Busca -->
        <div class="row mb-4">
          <div class="col-md-6">
            <input type="text" class="form-control" id="campoBusca" placeholder="Buscar por nome, email ou CPF...">
          </div>
        </div>

        <!-- Tabela de Clientes -->
        <div class="table-responsive">
          <table class="table table-striped table-hover">
            <thead class="table-dark">
              <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>CPF</th>
                <th>Cidade</th>
                <th>Data Cadastro</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaClientes">
              <tr>
                <td colspan="7" class="text-center text-muted">Nenhum cliente cadastrado</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Modal de Edição -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalEditarLabel">Editar Cliente</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="formEditar">
              <input type="hidden" id="editarId">
              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="editarNome" class="form-label">Nome</label>
                  <input type="text" class="form-control" id="editarNome" required>
                </div>
                <div class="col-md-6">
                  <label for="editarEmail" class="form-label">Email</label>
                  <input type="email" class="form-control" id="editarEmail" required>
                </div>
              </div>
              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="editarTelefone" class="form-label">Telefone</label>
                  <input type="tel" class="form-control" id="editarTelefone" required>
                </div>
                <div class="col-md-6">
                  <label for="editarCidade" class="form-label">Cidade</label>
                  <input type="text" class="form-control" id="editarCidade" required>
                </div>
              </div>
              <div class="mb-3">
                <label for="editarObservacoes" class="form-label">Observações</label>
                <textarea class="form-control" id="editarObservacoes" rows="2"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btnSalvarEdicao">Salvar Alterações</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-body-tertiary">
      <div class="container">
        <span class="text-body-secondary">&copy; 2026 Sistema de Vendas. Todos os direitos reservados.</span>
      </div>
    </footer>

    <script src="../../assets/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
      function carregarClientes() {
        const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
        const tbody = document.getElementById('tabelaClientes');
        
        if (clientes.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Nenhum cliente cadastrado</td></tr>';
          return;
        }

        tbody.innerHTML = clientes.map(cliente => `
          <tr>
            <td>${cliente.nome}</td>
            <td>${cliente.email}</td>
            <td>${cliente.telefone}</td>
            <td>${cliente.cpf}</td>
            <td>${cliente.cidade}</td>
            <td>${cliente.dataCadastro}</td>
            <td>
              <button class="btn btn-sm btn-warning" onclick="abrirEdicao(${cliente.id})">Editar</button>
              <button class="btn btn-sm btn-danger" onclick="deletarCliente(${cliente.id})">Deletar</button>
            </td>
          </tr>
        `).join('');
      }

      function abrirEdicao(id) {
        const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
        const cliente = clientes.find(c => c.id === id);
        
        if (cliente) {
          document.getElementById('editarId').value = cliente.id;
          document.getElementById('editarNome').value = cliente.nome;
          document.getElementById('editarEmail').value = cliente.email;
          document.getElementById('editarTelefone').value = cliente.telefone;
          document.getElementById('editarCidade').value = cliente.cidade;
          document.getElementById('editarObservacoes').value = cliente.observacoes || '';
          
          const modal = new bootstrap.Modal(document.getElementById('modalEditar'));
          modal.show();
        }
      }

      function salvarEdicao() {
        const id = parseInt(document.getElementById('editarId').value);
        const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
        const index = clientes.findIndex(c => c.id === id);
        
        if (index !== -1) {
          clientes[index].nome = document.getElementById('editarNome').value;
          clientes[index].email = document.getElementById('editarEmail').value;
          clientes[index].telefone = document.getElementById('editarTelefone').value;
          clientes[index].cidade = document.getElementById('editarCidade').value;
          clientes[index].observacoes = document.getElementById('editarObservacoes').value;
          
          localStorage.setItem('clientes', JSON.stringify(clientes));
          bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
          carregarClientes();
        }
      }

      function deletarCliente(id) {
        if (confirm('Tem certeza que deseja deletar este cliente?')) {
          let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
          clientes = clientes.filter(c => c.id !== id);
          localStorage.setItem('clientes', JSON.stringify(clientes));
          carregarClientes();
        }
      }

      document.getElementById('btnSalvarEdicao').addEventListener('click', salvarEdicao);

      document.getElementById('campoBusca').addEventListener('keyup', function() {
        const termo = this.value.toLowerCase();
        const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
        const filtrados = clientes.filter(c => 
          c.nome.toLowerCase().includes(termo) || 
          c.email.toLowerCase().includes(termo) || 
          c.cpf.includes(termo)
        );
        
        const tbody = document.getElementById('tabelaClientes');
        if (filtrados.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Nenhum cliente encontrado</td></tr>';
          return;
        }

        tbody.innerHTML = filtrados.map(cliente => `
          <tr>
            <td>${cliente.nome}</td>
            <td>${cliente.email}</td>
            <td>${cliente.telefone}</td>
            <td>${cliente.cpf}</td>
            <td>${cliente.cidade}</td>
            <td>${cliente.dataCadastro}</td>
            <td>
              <button class="btn btn-sm btn-warning" onclick="abrirEdicao(${cliente.id})">Editar</button>
              <button class="btn btn-sm btn-danger" onclick="deletarCliente(${cliente.id})">Deletar</button>
            </td>
          </tr>
        `).join('');
      });

      document.addEventListener('DOMContentLoaded', carregarClientes);
    </script>
  </body>
</html>

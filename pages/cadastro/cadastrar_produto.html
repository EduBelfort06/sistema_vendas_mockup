<!doctype html>
<html lang="pt-BR" class="h-100" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Cadastrar Produto" />
    <title>Cadastrar Produto - Sistema de Vendas</title>
    <script src="../../assets/js/color-modes.js"></script>
    <link href="../../assets/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="../../sticky-footer-navbar.css" rel="stylesheet" />
    <link href="../../assets/css/custom.css" rel="stylesheet" />
  </head>
  <body class="d-flex flex-column h-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="../../index.html">📊 Sistema de Vendas</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="../listas/listar_clientes.html">👥 Clientes</a></li>
            <li class="nav-item"><a class="nav-link" href="../listas/listar_produto.html">📦 Produtos</a></li>
            <li class="nav-item"><a class="nav-link" href="../listas/listar_pedido.html">🛒 Pedidos</a></li>
            <li class="nav-item ms-2 dropdown">
              <button id="theme-toggle-btn" class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Selecionar tema">
                <i class="bi bi-sun-fill"></i>
                <span class="theme-text d-none d-md-inline">Claro</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><button class="dropdown-item theme-option" type="button" data-theme="light"><i class="bi bi-sun-fill me-2"></i> Claro</button></li>
                <li><button class="dropdown-item theme-option" type="button" data-theme="dark"><i class="bi bi-moon-fill me-2"></i> Escuro</button></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-shrink-0">
      <div class="container py-5">
        <div class="row">
          <div class="col-lg-8 offset-lg-2">
            <h1 class="mb-4">Cadastrar Novo Produto</h1>
            
            <form id="formProduto">
              <div class="row mb-3">
                <div class="col-md-8">
                  <label for="nomeProduto" class="form-label">Nome do Produto *</label>
                  <input type="text" class="form-control" id="nomeProduto" placeholder="Notebook Dell" required>
                </div>
                <div class="col-md-4">
                  <label for="codigo" class="form-label">Código SKU *</label>
                  <input type="text" class="form-control" id="codigo" placeholder="SKU-001" required>
                </div>
              </div>

              <div class="mb-3">
                <label for="descricao" class="form-label">Descrição *</label>
                <textarea class="form-control" id="descricao" rows="3" placeholder="Descrição detalhada do produto..." required></textarea>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="categoria" class="form-label">Categoria *</label>
                  <select class="form-select" id="categoria" required>
                    <option value="">Selecione uma categoria</option>
                    <option value="Eletrônicos">Eletrônicos</option>
                    <option value="Roupas">Roupas</option>
                    <option value="Alimentos">Alimentos</option>
                    <option value="Livros">Livros</option>
                    <option value="Móveis">Móveis</option>
                    <option value="Outros">Outros</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label for="marca" class="form-label">Marca</label>
                  <input type="text" class="form-control" id="marca" placeholder="Dell">
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="preco" class="form-label">Preço (R$) *</label>
                  <input type="number" class="form-control" id="preco" placeholder="1999.99" step="0.01" min="0" required>
                </div>
                <div class="col-md-6">
                  <label for="quantidade" class="form-label">Quantidade em Estoque *</label>
                  <input type="number" class="form-control" id="quantidade" placeholder="10" min="0" required>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="fornecedor" class="form-label">Fornecedor</label>
                  <input type="text" class="form-control" id="fornecedor" placeholder="Fornecedor XYZ">
                </div>
                <div class="col-md-6">
                  <label for="dataValidade" class="form-label">Data de Validade</label>
                  <input type="date" class="form-control" id="dataValidade">
                </div>
              </div>

              <div class="mb-3">
                <label for="observacoes" class="form-label">Observações</label>
                <textarea class="form-control" id="observacoes" rows="2" placeholder="Adicione observações sobre o produto..."></textarea>
              </div>

              <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <a href="../listas/listar_produto.html" class="btn btn-secondary">Cancelar</a>
                <button type="reset" class="btn btn-warning">Limpar</button>
                <button type="submit" class="btn btn-primary">Salvar Produto</button>
              </div>
            </form>

            <div id="alertaMsg" class="alert alert-success mt-3" style="display: none;" role="alert"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-body-tertiary">
      <div class="container">
        <span class="text-body-secondary">&copy; 2026 Sistema de Vendas. Todos os direitos reservados.</span>
      </div>
    </footer>

    <script src="../../assets/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
      document.getElementById('formProduto').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const produto = {
          id: Date.now(),
          nome: document.getElementById('nomeProduto').value,
          codigo: document.getElementById('codigo').value,
          descricao: document.getElementById('descricao').value,
          categoria: document.getElementById('categoria').value,
          marca: document.getElementById('marca').value,
          preco: parseFloat(document.getElementById('preco').value),
          quantidade: parseInt(document.getElementById('quantidade').value),
          fornecedor: document.getElementById('fornecedor').value,
          dataValidade: document.getElementById('dataValidade').value,
          observacoes: document.getElementById('observacoes').value,
          dataCadastro: new Date().toLocaleDateString('pt-BR')
        };

        let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        produtos.push(produto);
        localStorage.setItem('produtos', JSON.stringify(produtos));

        // Mostrar mensagem de sucesso
        const alerta = document.getElementById('alertaMsg');
        alerta.textContent = '✅ Produto cadastrado com sucesso!';
        alerta.style.display = 'block';

        // Limpar formulário
        document.getElementById('formProduto').reset();

        // Redirecionar após 2 segundos
        setTimeout(() => {
          window.location.href = '../listas/listar_produto.html';
        }, 2000);
      });
    </script>
  </body>
</html>
